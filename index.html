<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Stranger</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Secure Stranger</h1>
        <p>Stay Safe from Online Strangers</p>

        <h2>Password Strength Checker</h2>

        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="checkPassword()">Check</button>

        <p id="result"></p>

        <h2>Safety Tips</h2>

        <ul>
            <li>Never share your OTP.</li>
            <li>Never share your Password.</li>
            <li>Don't trust unknown links.</li>
            <li>Block suspicious strangers.</li>
            <li>Enable Two-Factor Authentication.</li>
        </ul>
    </div>

    <script src="script.js"></script>

</body>

</html>
